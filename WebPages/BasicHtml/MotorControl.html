<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons and Slider Example</title>
    <style>
        /* Basic styling to center content and make it look nice */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        .button-group {
            margin-bottom: 30px;
        }

        /* Styling for the 5 buttons */
        button {
            padding: 10px 20px;
            margin: 0 5px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Styling for the slider container */
        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            width: 250px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="button-group">
        <button id="btn1">Button 1</button>
        <button id="btn2">Button 2</button>
        <button id="btn3">Button 3</button>
        <button id="btn4">Button 4</button>
        <button id="btn5">Button 5</button>
    </div>

    <div class="slider-group">
        <label for="volumeSlider"><strong>Value Slider:</strong></label>
        <input type="range" id="volumeSlider" min="0" max="100" value="50">
    </div>

</body>
</html>

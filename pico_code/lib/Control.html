<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons and Slider Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }

        /* Container for the rows of buttons */
        .button-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Spacing between the top and bottom rows */
            margin-bottom: 40px;
        }

        /* Flexbox handles centering the buttons within each row */
        .button-row {
            display: flex;
            justify-content: center;
            gap: 15px; /* Spacing between buttons in the same row */
        }

        /* Button Styling */
        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        /* Styling for the slider container */
        .slider-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            width: 250px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="button-container">
        <div class="button-row">
            <button id="btn1">Button 1</button>
            <button id="btn2">Button 2</button>
        </div>
        <div class="button-row">
            <button id="btn3">Button 3</button>
            <button id="btn4">Button 4</button>
            <button id="btn5">Button 5</button>
        </div>
    </div>

    <div class="slider-group">
        <label for="volumeSlider"><strong>Value Slider:</strong></label>
        <input type="range" id="volumeSlider" min="0" max="100" value="50">
    </div>

</body>
</html>
